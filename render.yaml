# Render.com Configuration for Wolf Pack Game
services:
  # Backend API Service
  - type: web
    name: wolf-pack-game-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: wolfpack-db
          property: connectionString
    healthCheckPath: /api/health
    autoDeploy: true

  # PostgreSQL Database
  - type: postgres
    name: wolfpack-db
    ipAllowList: []
    plan: free

databases:
  - name: wolfpack-db
    databaseName: wolfeggs
    user: wolfeggs
    plan: free