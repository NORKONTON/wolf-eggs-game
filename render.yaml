# Render.com Configuration for Wolf Pack Game
services:
  # Main Game Server (backend)
  - type: web
    name: wolf-pack-game
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: TELEGRAM_BOT_TOKEN
        value: 8634703769:AAGVECnXD_iD_bLa0gAoib6jCZjy42-uA1U
      - key: TON_WALLET_ADDRESS
        value: UQDW-GZlpaNOupnMe2xTiJfNDKH_aYShyz_18z_BYon9zKpe
    healthCheckPath: /health
    autoDeploy: true

  # Background Worker (for async tasks)
  - type: worker
    name: wolf-pack-worker
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        value: 8634703769:AAGVECnXD_iD_bLa0gAoib6jCZjy42-uA1U
    autoDeploy: true