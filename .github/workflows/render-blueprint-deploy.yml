name: Render Blueprint Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'render.yaml'
      - 'package.json'
      - 'server.js'
      - 'bot/**'
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy using Render Blueprint
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      run: |
        echo "🚀 Запуск деплою через Render Blueprint..."
        
        # Перевірка наявності render.yaml
        if [ ! -f "render.yaml" ]; then
          echo "❌ Файл render.yaml не знайдено"
          exit 1
        fi
        
        # Створення/оновлення сервісу через Blueprint
        RESPONSE=$(curl -s -X POST "https://api.render.com/v1/blueprints" \
          -H "Authorization: Bearer $RENDER_API_KEY" \
          -H "Content-Type: application/json" \
          -d "{
            \"repo\": \"https://github.com/NORKONTON/wolf-eggs-game\",
            \"branch\": \"main\",
            \"name\": \"wolf-pack-game-blueprint\"
          }")
        
        echo "📋 Відповідь від Render:"
        echo "$RESPONSE" | jq .
        
        BLUEPRINT_ID=$(echo "$RESPONSE" | jq -r '.id')
        
        if [ -n "$BLUEPRINT_ID" ] && [ "$BLUEPRINT_ID" != "null" ]; then
          echo "✅ Blueprint створено (ID: $BLUEPRINT_ID)"
          echo "🌐 Переглянути: https://dashboard.render.com/blueprints/$BLUEPRINT_ID"
        else
          echo "⚠️ Можливо, blueprint вже існує"
          echo "ℹ️ Render автоматично деплойне зміни через кілька хвилин"
        fi
        
    - name: Wait and check status
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      run: |
        echo "⏳ Чекаємо 60 секунд на ініціалізацію..."
        sleep 60
        
        # Спроба отримати URL сервісу
        SERVICES=$(curl -s -X GET "https://api.render.com/v1/services" \
          -H "Authorization: Bearer $RENDER_API_KEY")
        
        echo "📊 Список сервісів:"
        echo "$SERVICES" | jq '.[] | {name, serviceType, url}'
        
    - name: Send success notification
      if: success()
      env:
        TELEGRAM_BOT_TOKEN: "8634703769:AAGVECnXD_iD_bLa0gAoib6jCZjy42-uA1U"
        TELEGRAM_CHAT_ID: "5815938420"
      run: |
        curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d "chat_id=$TELEGRAM_CHAT_ID" \
          -d "text=✅ Render Blueprint деплой запущено!%0A📊 GitHub Actions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          -d "parse_mode=HTML"